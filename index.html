<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinical and Biomedical Literature Research Agent</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f8f9fa;
            color: #333;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 32px;
        }

        header h1 {
            font-size: 1.6rem;
            font-weight: 600;
            color: #1a1a2e;
        }

        header p {
            margin-top: 6px;
            color: #666;
            font-size: 0.95rem;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: #4a90d9;
        }

        button {
            padding: 12px 24px;
            background: #1a1a2e;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover { background: #2d2d5e; }
        button:disabled { background: #aaa; cursor: not-allowed; }

        .steps {
            background: #1a1a2e;
            color: #a8d8a8;
            border-radius: 8px;
            padding: 16px;
            font-family: monospace;
            font-size: 0.85rem;
            margin-bottom: 24px;
            min-height: 60px;
            display: none;
        }

        .steps p { margin: 4px 0; }

        .answer {
            background: white;
            border-radius: 8px;
            padding: 28px;
            border: 1px solid #e0e0e0;
            display: none;
        }

        .answer h1, .answer h2, .answer h3 {
            margin-top: 20px;
            margin-bottom: 8px;
            color: #1a1a2e;
        }

        .answer h1 { font-size: 1.3rem; }
        .answer h2 { font-size: 1.1rem; }
        .answer p { margin: 10px 0; line-height: 1.7; }

        .answer table {
            width: 100%;
            border-collapse: collapse;
            margin: 16px 0;
            font-size: 0.9rem;
        }

        .answer th, .answer td {
            border: 1px solid #ddd;
            padding: 8px 12px;
            text-align: left;
        }

        .answer th { background: #f0f0f0; font-weight: 600; }
        .answer tr:nth-child(even) { background: #fafafa; }

        .answer a { color: #4a90d9; text-decoration: none; }
        .answer a:hover { text-decoration: underline; }

        .answer blockquote {
            border-left: 3px solid #4a90d9;
            padding-left: 12px;
            color: #666;
            margin: 10px 0;
        }

        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid #a8d8a8;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔬 Clinical and Biomedical Literature Research Agent</h1>
            <p>Ask a research question and get a synthesized answer grounded in recent PubMed literature.</p>
        </header>

        <div class="search-box">
            <input type="text" id="question" placeholder="What do you want to research today?" />
            <button id="searchBtn" onclick="search()">Search</button>
        </div>

        <div class="steps" id="steps"></div>
        <div class="answer" id="answer"></div>
    </div>

    <script>
        async function search() {
            const question = document.getElementById('question').value.trim();
            if (!question) return;

            const btn = document.getElementById('searchBtn');
            const stepsDiv = document.getElementById('steps');
            const answerDiv = document.getElementById('answer');

            // Reset UI
            btn.disabled = true;
            btn.textContent = 'Searching...';
            stepsDiv.style.display = 'block';
            stepsDiv.innerHTML = '<p><span class="spinner"></span> Starting agent...</p>';
            answerDiv.style.display = 'none';
            answerDiv.innerHTML = '';

            try {
                const response = await fetch('/research', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        const data = JSON.parse(line.slice(6));

                        if (data.type === 'step') {
                            stepsDiv.innerHTML += `<p>✓ ${data.content}</p>`;
                        } else if (data.type === 'answer') {
                            stepsDiv.innerHTML += '<p>✍️ Synthesizing complete.</p>';
                            answerDiv.style.display = 'block';
                            answerDiv.innerHTML = marked.parse(data.content);
                        }
                    }
                }
            } catch (err) {
                stepsDiv.innerHTML += `<p style="color: #ff6b6b;">Error: ${err.message}</p>`;
            } finally {
                btn.disabled = false;
                btn.textContent = 'Search';
            }
        }

        // Allow Enter key to trigger search
        document.getElementById('question').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') search();
        });
    </script>
</body>
</html>
